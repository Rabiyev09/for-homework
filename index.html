<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>CSS Pseudo-classes</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Pseudo-classes: hover & focus</h1>

    <form>
        <input type="text" placeholder="Enter your name">

        <button type="submit">Submit</button>
    </form>

    <hr>

    <h2>first-child & last-child</h2>

    <ul>
        <li>First item</li>
        <li>Middle item</li>
        <li>Last item</li>
    </ul>

    <hr>

    <h2>Pseudo-classes on different elements</h2>

    <div class="content-block">
        <p>Paragraph 1</p>
        <p>Paragraph 2</p>
        <p>Paragraph 3</p>

        <a href="#">Sample link</a>
    </div>

    <hr>

    <h2>Combination of pseudo-classes</h2>

    <div class="combo">
        <p>First paragraph</p>
        <p>Middle paragraph</p>
        <input type="text" placeholder="Focus me (last child)">
    </div>

</body>
</html>
